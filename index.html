<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple QR Code Generator</title>
    <link rel="stylesheet" href="style.css" />
    <!-- qrcode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    
    <div class="app">
      <div class="card">
        <h1 class="title">QR Code Generator</h1>
        <p class="subtitle">Create branded QR codes with live preview.</p>

       <nav class="nav-tabs">

<button class="nav-tab active" data-tab="website">
🌐 Website
</button>

<button class="nav-tab" data-tab="pdf">
📄 PDF
</button>

<button class="nav-tab" data-tab="app">
📱 App Download
</button>

<button class="nav-tab" data-tab="contact">
👤 Contact Card
</button>

<button class="nav-tab" data-tab="linkpage">
🔗 Link Page
</button>

<button class="nav-tab" data-tab="text">
📝 Text
</button>

<button class="nav-tab" data-tab="email">
✉️ Email
</button>

<button class="nav-tab" data-tab="sms">
💬 SMS
</button>
<div class="tab-indicator"></div>

</nav>

        <div class="dashboard">
          <aside class="sidebar">
            <h2 class="panel-title">QR Customization</h2>

           <div class="templates-row">
            <div class="template-slider">

<div class="qr-template" data-style="classic">
<div class="qr-sample classic"></div>
<span>Classic</span>
</div>

<div class="qr-template" data-style="dots">
<div class="qr-sample dots"></div>
<span>Dots</span>
</div>

<div class="qr-template" data-style="rounded">
<div class="qr-sample rounded"></div>
<span>Rounded</span>
</div>

<div class="qr-template" data-style="colorful">
<div class="qr-sample colorful"></div>
<span>Color</span>
</div>

</div>
  <span class="templates-label">Templates</span>

  <div class="template-gallery">

    <div class="template-item" data-template="classic">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=classic" />
      <span>Classic</span>
    </div>

    <div class="template-item" data-template="brand">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=brand&color=667eea" />
      <span>Brand</span>
    </div>

    <div class="template-item" data-template="dark">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=dark&bgcolor=000000&color=ffffff" />
      <span>Dark</span>
    </div>

  </div>
</div>

            <div class="logo-upload">

<label class="field-label small-label">
Logo (drag & drop)
</label>

<div id="logo-drop" class="logo-drop">

<p>Drag logo here</p>

<input
type="file"
id="qr-logo"
class="file-input"
accept="image/png, image/jpeg"
/>

</div>

</div>
            <div class="side-group">
              <label for="qr-pattern" class="field-label small-label"
                >Pattern</label
              >
              <select id="qr-pattern" class="type-select small-select">
                <option value="default">Default</option>
                <option value="rounded">Rounded</option>
                <option value="dots">Dots</option>
              </select>
            </div>

            <div class="side-group">
              <label for="qr-eyes" class="field-label small-label"
                >Eye style</label
              >
              <select id="qr-eyes" class="type-select small-select">
                <option value="square">Square</option>
                <option value="rounded">Rounded</option>
              </select>
            </div>

            <div class="side-group">
              <label for="qr-frame-style" class="field-label small-label"
                >Frame</label
              >
              <select id="qr-frame-style" class="type-select small-select">
                <option value="none">None</option>
                <option value="card">Card</option>
                <option value="pill">Pill</option>
                <option value="tag">Tag “Scan Me”</option>
              </select>
            </div>

            <div class="side-group">
              <label for="qr-cta" class="field-label small-label"
                >Call to action</label
              >
              <select id="qr-cta" class="type-select small-select">
                <option value="scan">Scan Me</option>
                <option value="offer">Get Offer</option>
                <option value="website">Open Website</option>
              </select>
            </div>
          </aside>

          <main class="main-panel">
            <h2 class="panel-title">Content Input</h2>

            <div id="tab-website" class="tab-content">
              <label for="website-url" class="field-label">Website URL</label>
              <input id="website-url" type="text" class="text-input" placeholder="https://example.com" />
            </div>

            <div id="tab-pdf" class="tab-content hidden">
              <label for="pdf-file" class="field-label">Upload PDF</label>
              <input id="pdf-file" type="file" class="file-input" accept=".pdf" />
            </div>

            <div id="tab-app" class="tab-content hidden">
              <label for="app-store" class="field-label">App Store URL</label>
              <input id="app-store" type="text" class="text-input" placeholder="https://apps.apple.com/..." />
              <label for="play-store" class="field-label small-label">Play Store URL</label>
              <input id="play-store" type="text" class="text-input" placeholder="https://play.google.com/..." />
            </div>

            <div id="tab-contact" class="tab-content hidden">
              <label for="contact-name" class="field-label">Name</label>
              <input id="contact-name" type="text" class="text-input" placeholder="John Doe" />
              <label for="contact-phone" class="field-label small-label">Phone</label>
              <input id="contact-phone" type="tel" class="text-input" placeholder="+1 234 567 890" />
              <label for="contact-email" class="field-label small-label">Email</label>
              <input id="contact-email" type="email" class="text-input" placeholder="john@example.com" />
            </div>

            <div id="tab-location" class="tab-content hidden">
              <label for="location-url" class="field-label">Location URL</label>
              <input id="location-url" type="text" class="text-input" placeholder="https://maps.google.com/..." />
            </div>

            <div id="tab-linkpage" class="tab-content hidden">
              <label for="link-1" class="field-label">Link 1</label>
              <input id="link-1" type="text" class="text-input" placeholder="https://example.com/link1" />
              <label for="link-2" class="field-label small-label">Link 2</label>
              <input id="link-2" type="text" class="text-input" placeholder="https://example.com/link2" />
              <label for="link-3" class="field-label small-label">Link 3</label>
              <input id="link-3" type="text" class="text-input" placeholder="https://example.com/link3" />
            </div>

            <div id="tab-form" class="tab-content hidden">
              <label for="form-title" class="field-label">Form Title</label>
              <input id="form-title" type="text" class="text-input" placeholder="Contact Form" />
              <label for="form-url" class="field-label small-label">Form URL</label>
              <input id="form-url" type="text" class="text-input" placeholder="https://forms.example.com/..." />
            </div>
            <div id="tab-text" class="tab-content hidden">

<label class="field-label">Text</label>

<input
id="text-input"
type="text"
class="text-input"
placeholder="Enter text"
/>

</div>


<div id="tab-email" class="tab-content hidden">

<label class="field-label">Email</label>

<input
id="email-input"
type="email"
class="text-input"
placeholder="example@email.com"
/>

</div>


<div id="tab-sms" class="tab-content hidden">

<label class="field-label">Phone Number</label>

<input
id="sms-phone"
type="text"
class="text-input"
placeholder="+91XXXXXXXXXX"
/>

<label class="field-label small-label">Message</label>

<input
id="sms-message"
type="text"
class="text-input"
placeholder="Enter SMS"
/>

</div>

            <div class="options main-options">
              <div class="options-row">
                <label for="qr-color" class="field-label small-label"
                  >QR color</label
                >
                <input
                  type="color"
                  id="qr-color"
                  class="color-input"
                  value="#111827"
                />
              </div>
              <div class="options-row">
                <label for="qr-bg-color" class="field-label small-label"
                  >Background</label
                >
                <input
                  type="color"
                  id="qr-bg-color"
                  class="color-input"
                  value="#ffffff"
                />
              </div>
              <div class="options-row wide">
                <label for="qr-size" class="field-label small-label">
                  Size
                  <span id="qr-size-value" class="size-value">220px</span>
                </label>
                <input
                  type="range"
                  id="qr-size"
                  min="150"
                  max="320"
                  value="220"
                />
              </div>
              <div class="options-row wide">
                <label class="field-label small-label">
                  Color mode
                  <span id="qr-gradient-label" class="size-value">Solid</span>
                </label>
                <div class="gradient-row">
                  <label class="tiny-label">
                    <input type="checkbox" id="qr-gradient-toggle" />
                    Gradient
                  </label>
                  <input
                    type="color"
                    id="qr-gradient-color"
                    class="color-input small-color"
                    value="#22c55e"
                  />
                </div>
              </div>
            </div>

            <div class="toggle-switches">
              <label class="toggle-label">
                <input type="checkbox" id="update-later" />
                <span>Update later</span>
              </label>
              <label class="toggle-label">
                <input type="checkbox" id="track-analytics" />
                <span>Track analytics</span>
              </label>
              <label class="toggle-label">
                <input type="checkbox" id="enable-gps" />
                <span>Enable GPS</span>
              </label>
            </div>

            <button id="generate-btn" class="btn primary-btn">
              Generate QR Code
            </button>
          </main>

          <section class="preview-panel">
            <h2 class="panel-title">QR Preview</h2>

            <div class="preview-wrapper">
              <div id="qr-frame" class="qr-frame qr-frame-none">
                <div id="qr-preview" class="qr-preview">
                  <div class="placeholder-text">
                    Your QR code will appear here
                  </div>
                </div>
                <div id="qr-frame-caption" class="frame-caption">Scan Me</div>
              </div>
            </div>

            <div class="scan-status">
              <span id="scan-status-dot" class="status-dot status-idle"></span>
              <span id="scan-status-text" class="status-text"
                >Waiting for content</span
              >
            </div>

            <div class="signup-section">
              <label for="email-signup" class="field-label small-label">Email address</label>
              <input
                id="email-signup"
                type="email"
                class="text-input"
                placeholder="your@email.com"
              />
              <button class="btn signup-btn">
                Sign up to save
              </button>
            </div>

            <div class="download-section">
              <label for="download-format" class="field-label small-label">Download format</label>
              <select id="download-format" class="type-select">
                <option value="png">PNG</option>
                <option value="svg">SVG</option>
                <option value="jpeg">JPG</option>
              </select>
              <button id="download-btn" class="btn secondary-btn" disabled>
                Download QR Code
              </button>
            </div>

            <button id="save-local-btn" class="btn secondary-btn">
              Save to this browser
            </button>

            <h2 class="panel-title" style="margin-top: 20px">
              Saved (this browser)
            </h2>
            <div id="local-saved-list" class="saved-list">
              <p class="hint">No saved QR codes yet.</p>
            </div>
          </section>
        </div>
      </div>
    </div>
  </body>
</html>
